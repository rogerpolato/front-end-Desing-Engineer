<!DOCTYPE html>
<!--DTD é o Document Type Definition e informa o navegador a versão do HTML que esta sendo carregada. assim o navegador pode carregar um conjunto de bibliotecas de acordo com a versão específica.
 -->
<!-- ATRIBUTOS:
Os atributos são do tipo chave = valor.
Ex: lang="pt-BR", isso é um atributo que pode ir em qualquer tag de conteúdo. <html lang="pt-BR> ... </html>

<html lang="pt-br">

  <head>
    <meta charset="UTF-8">
  </head>

  <body>
  </body>

</html>
